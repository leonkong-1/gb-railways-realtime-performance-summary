<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Real-Time Performance</title>
  <link href="https://fonts.googleapis.com/css2?family=Overpass:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:            #0b0d12;
      --header-bg:     #002147;
      --header-accent: #CC0000;
      --surface:       #13161c;
      --border:        #252a35;
      --text:          #f0f2f5;
      --muted:         #6b7280;

      --green:         #4ade80;
      --green-bg:      #052e16;
      --green-border:  #166534;

      --amber:         #fbbf24;
      --amber-bg:      #1c1003;
      --amber-border:  #78350f;

      --red:           #f87171;
      --red-bg:        #1f0808;
      --red-border:    #7f1d1d;
    }

    html, body { height: 100%; overflow: hidden; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Overpass', 'Helvetica Neue', Arial, sans-serif;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER — desktop ───────────────────────────── */
    .header {
      background: var(--header-bg);
      border-bottom: 3px solid var(--header-accent);
      padding: 1.4vh 2.2vw;
      display: grid;
      grid-template-columns: auto 1fr 1fr auto;
      align-items: center;
      gap: 2vw;
      flex-shrink: 0;
    }

    .brand-block {
      display: flex;
      flex-direction: column;
      gap: 0.4vh;
      min-width: 0;
    }

    .brand-title {
      font-size: clamp(18px, 2.5vw, 46px);
      font-weight: 700;
      letter-spacing: 0.01em;
      color: #ffffff;
      line-height: 1;
    }

    .brand-subtitle {
      font-size: clamp(10px, 1.0vw, 16px);
      font-weight: 400;
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.04em;
      white-space: nowrap;
    }

    /* National metric lozenges */
    .nat-metric {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.3vh;
      padding: 1.0vh 1.4vw;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      min-width: 0;
    }

    .nat-metric-label {
      font-size: clamp(10px, 0.95vw, 17px);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: rgba(255,255,255,0.55);
      white-space: nowrap;
    }

    .nat-metric-value {
      font-size: clamp(34px, 5.8vw, 106px);
      font-weight: 700;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    #natCancVal { font-weight: 300; }

    /* Live block */
    .live-block {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 0.8vh;
    }

    .live-pill {
      display: flex;
      align-items: center;
      gap: 0.5vw;
      padding: 0.4vh 0.9vw;
      background: rgba(74, 222, 128, 0.12);
      border: 1px solid rgba(74, 222, 128, 0.3);
      border-radius: 100px;
    }

    .live-pill.error-pill {
      background: rgba(248, 113, 113, 0.12);
      border-color: rgba(248, 113, 113, 0.3);
    }

    .live-dot {
      width: clamp(7px, 0.55vw, 11px);
      height: clamp(7px, 0.55vw, 11px);
      border-radius: 50%;
      background: var(--green);
      animation: blink 2s ease-in-out infinite;
      flex-shrink: 0;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.2; }
    }

    .live-text {
      font-size: clamp(9px, 0.82vw, 14px);
      font-weight: 700;
      color: var(--green);
      text-transform: uppercase;
      letter-spacing: 0.14em;
    }

    .timestamp {
      font-size: clamp(14px, 1.8vw, 32px);
      font-weight: 300;
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.04em;
      font-variant-numeric: tabular-nums;
    }

    .datestamp {
      font-size: clamp(10px, 1.0vw, 16px);
      font-weight: 300;
      color: rgba(255,255,255,0.3);
      letter-spacing: 0.04em;
      font-variant-numeric: tabular-nums;
    }

    .last-updated {
      font-size: clamp(8px, 0.65vw, 11px);
      font-weight: 400;
      color: rgba(255,255,255,0.25);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-variant-numeric: tabular-nums;
    }

    /* ── HEADER — mobile ────────────────────────────── */
    @media (max-width: 700px) {
      .header {
        grid-template-columns: 1fr 1fr;
        grid-template-rows: auto auto;
        gap: 2vw 3vw;
        padding: 2.5vw 3.5vw;
      }

      .brand-block    { grid-column: 1; grid-row: 1; }
      .brand-title    { font-size: clamp(16px, 5vw, 28px); }
      .brand-subtitle { font-size: clamp(10px, 3.0vw, 13px); white-space: normal; }
      .live-block     { grid-column: 2; grid-row: 1; align-self: center; }
      #natPunct       { grid-column: 1; grid-row: 2; }
      #natCanc        { grid-column: 2; grid-row: 2; }

      .nat-metric-label { font-size: 10px; letter-spacing: 0.06em; }
      .nat-metric-value { font-size: clamp(28px, 9.5vw, 50px); }

      .nat-metric {
        padding: 1.5vw 2vw;
        align-items: flex-start;
      }

      .live-pill  { gap: 1.5vw; padding: 1vw 2vw; }
      .live-text  { font-size: 10px; }
      .timestamp  { font-size: clamp(13px, 4vw, 20px); }

      /* Allow page to scroll on mobile */
      html, body  { height: auto; overflow-y: auto; }
      body        { min-height: 100vh; }

      /* Grid: 2 columns, auto-height rows, scrollable */
      .grid-wrap  { flex: none; overflow: visible; padding: 2vw 3vw 6vw; }
      .toc-grid   { grid-template-columns: repeat(2, 1fr); gap: 2.5vw; }
      .toc-card   { padding: 2.5vw 3vw; }
      .toc-name   { font-size: 4.2vw; }
      .toc-metric-label { font-size: 2.2vw; }

      /* Sort bar */
      .sort-bar   { gap: 2.5vw; padding: 2vw 3vw 0; flex-wrap: wrap; }
      .sort-btn   { font-size: 2.8vw; padding: 1.2vw 2vw; letter-spacing: 0.06em; }

      /* Sector header — mobile */
      .sector-header {
        height: auto;
        padding: 2.5vw 1vw 1vw;
        font-size: clamp(10px, 3.4vw, 15px);
        letter-spacing: 0.08em;
        gap: 2vw;
      }
    }

    /* ── SECTOR HEADER ───────────────────────────────── */
    .sector-header {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      gap: 0.8vw;
      height: 32px; /* fixed — used in desktop row-height maths */
      font-size: clamp(11px, 0.9vw, 16px);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--muted);
      padding: 0 0.2vw;
    }

    .sector-header::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── TOC GRID ────────────────────────────────────── */
    .grid-wrap {
      flex: 1;
      padding: 1.2vh 1.6vw 1.4vh;
      display: flex;
      overflow: hidden;
    }

    .toc-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: clamp(4px, 0.5vh, 9px) clamp(5px, 0.65vw, 11px);
      flex: 1;
    }

    .toc-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.6vh 0.75vw;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      overflow: hidden;
    }

    /* ── Desktop: horizontal card layout ─────────────── */
    /* Metrics are direct children — no toc-body wrapper on desktop */
    .card-row {
      display: grid;
      grid-template-columns: 40% 30% 30%;
      align-items: center;
      column-gap: 0.4vw;
    }

    /* First metric cell: left-aligned */
    .card-row .toc-metric {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      min-width: 0;
    }

    /* Both metric cells: left-aligned */
    .card-row .toc-metric.right {
      align-items: flex-start;
    }

    /* ── Shared card internals ──────────────────────── */
    .toc-name {
      font-size: clamp(11px, 1.05vw, 20px);
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .toc-body {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 0.5vw;
    }

    .toc-metric { display: flex; flex-direction: column; }
    .toc-metric.right { align-items: flex-end; }

    .toc-metric-value {
      font-size: clamp(20px, 3.5vw, 66px);
      font-weight: 700;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .canc-value {
      font-size: clamp(20px, 3.5vw, 66px);
      font-weight: 300;
      line-height: 1;
    }

    .toc-metric-label {
      font-size: clamp(7px, 0.6vw, 11px);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-top: 0.2vh;
    }

    /* ── Value update animation ─────────────────────── */
    @keyframes value-breathe {
      0%   { opacity: 1;    transform: scale(1);    }
      30%  { opacity: 0.15; transform: scale(0.94); }
      70%  { opacity: 1;    transform: scale(1.05); }
      100% { opacity: 1;    transform: scale(1);    }
    }

    .value-update {
      animation: value-breathe 0.75s ease-in-out;
    }

    /* ── RAG ─────────────────────────────────────────── */
    .green { color: var(--green); }
    .amber { color: var(--amber); }
    .red   { color: var(--red);   }

    .card-green { border-color: var(--green-border); }
    .card-amber { border-color: var(--amber-border); }
    .card-red   { border-color: var(--red-border);   }


    .nat-green { color: var(--green); }
    .nat-amber { color: var(--amber); }
    .nat-red   { color: var(--red);   }

    /* ── SORT BAR ────────────────────────────────── */
    .sort-bar {
      flex-shrink: 0;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 0.8vw;
      padding: 0.6vh 1.6vw 0;
    }

    .sort-group {
      display: flex;
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
    }

    .sort-btn {
      background: transparent;
      border: none;
      border-right: 1px solid var(--border);
      color: var(--muted);
      font-family: inherit;
      font-size: clamp(9px, 0.72vw, 13px);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 0.5vh 0.8vw;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
    }

    .sort-btn:last-child { border-right: none; }

    .sort-btn.active {
      background: rgba(255,255,255,0.08);
      color: var(--text);
    }

    .sort-btn:hover:not(.active) {
      background: rgba(255,255,255,0.04);
      color: rgba(255,255,255,0.7);
    }
  </style>
</head>
<body>

  <header class="header">

    <div class="brand-block">
      <span class="brand-title">GBR TOCs Real-Time Performance</span>
      <span class="brand-subtitle">Rolling daily totals from 04:30 hours</span>
    </div>

    <div class="nat-metric" id="natPunct">
      <span class="nat-metric-label" id="labelPunct">Time to 3 &mdash; National</span>
      <span class="nat-metric-value" id="natPunctVal">—</span>
    </div>

    <div class="nat-metric" id="natCanc">
      <span class="nat-metric-label" id="labelCanc">Cancellations &mdash; National</span>
      <span class="nat-metric-value" id="natCancVal">—</span>
    </div>

    <div class="live-block">
      <div class="live-pill">
        <div class="live-dot"></div>
        <span class="live-text">Live</span>
      </div>
      <span class="timestamp" id="timestamp">—</span>
      <span class="datestamp" id="datestamp">—</span>
      <span class="last-updated" id="lastUpdated">&nbsp;</span>
    </div>

  </header>

  <div class="sort-bar">
    <span style="font-size:clamp(9px,0.72vw,13px);font-weight:600;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted)">Sort by</span>
    <div class="sort-group">
      <button class="sort-btn active" id="btnPunct" onclick="setSortBy('punct')">Time to 3</button>
      <button class="sort-btn"        id="btnCanc"  onclick="setSortBy('canc')">Cancellations</button>
    </div>
    <div class="sort-group">
      <button class="sort-btn active" id="btnWorst" onclick="setSortDir('worst')">Worst first</button>
      <button class="sort-btn"        id="btnBest"  onclick="setSortDir('best')">Best first</button>
    </div>
  </div>

  <div class="grid-wrap">
    <div class="toc-grid" id="tocGrid"></div>
  </div>

  <script>
    // ── TOC lookup: long name → { abbr, sector, gbr } ────────────────────
    const TOC_MAP = {
      'Caledonian Sleeper Limited':   { abbr: 'Sleeper',    sector: 'Long Distance', gbr: false },
      'London North Eastern Railway': { abbr: 'LNER',       sector: 'Long Distance', gbr: true  },
      'Avanti West Coast':            { abbr: 'AWC',        sector: 'Long Distance', gbr: true  },
      'CrossCountry':                 { abbr: 'XC',         sector: 'Long Distance', gbr: true  },
      'Great Western Railway':        { abbr: 'GWR',        sector: 'Long Distance', gbr: true  },
      'TransPennine Trains':          { abbr: 'TPE',        sector: 'Long Distance', gbr: true  },
      'East Midlands Railway':        { abbr: 'EMR',        sector: 'Regional',      gbr: true  },
      'West Midlands Trains':         { abbr: 'WMT',        sector: 'Regional',      gbr: true  },
      'ScotRail':                     { abbr: 'ScotRail',   sector: 'Regional',      gbr: false },
      'Northern Trains':              { abbr: 'Northern',   sector: 'Regional',      gbr: true  },
      'Transport for Wales':          { abbr: 'TfW',        sector: 'Regional',      gbr: false },
      'Merseyrail':                   { abbr: 'Mersey',     sector: 'Regional',      gbr: false },
      'Govia Thameslink Railway':     { abbr: 'GTR',        sector: 'London & SE',   gbr: true  },
      'South Western Railway':        { abbr: 'SWR',        sector: 'London & SE',   gbr: true  },
      'Elizabeth line':               { abbr: 'Elizabeth',  sector: 'London & SE',   gbr: false },
      'Southeastern':                 { abbr: 'SER',        sector: 'London & SE',   gbr: true  },
      'London Overground':            { abbr: 'Overground', sector: 'London & SE',   gbr: false },
      'Chiltern':                     { abbr: 'Chiltern',   sector: 'London & SE',   gbr: true  },
      'Greater Anglia':               { abbr: 'GA',         sector: 'London & SE',   gbr: true  },
      'c2c':                          { abbr: 'c2c',        sector: 'London & SE',   gbr: true  },
    };

    const SECTOR_ORDER = ['Long Distance', 'Regional', 'London & SE', 'Non-GBR'];

    // ── Header labels ─────────────────────────────────────────────────────
    function setLabels() {
      const mobile = window.innerWidth <= 700;
      document.getElementById('labelPunct').textContent = mobile ? 'Time to 3' : 'Time to 3 \u2014 National';
      document.getElementById('labelCanc').textContent  = mobile ? 'Cancellations' : 'Cancellations \u2014 National';
    }
    setLabels();
    window.addEventListener('resize', () => { setLabels(); if (lastData) render(lastData); });

    const API_URL = 'https://api1.raildata.org.uk/1033-realtime-performance-data-experience-api---performance-datav4_0/performanceData/RTOTM';
    const API_KEY = 'tIeZWz6waRQH2J5WShqzEERdboH8a4IKwW8rwVAbxdKkKOmx';

    async function loadData() {
      const res = await fetch(API_URL, { headers: { 'x-apikey': API_KEY } });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const json = await res.json();
      const nat = json.performanceData.national;
      return {
        national: {
          punct: nat.RTOTM.punctuality.timeTo3.percent,
          canc:  nat.RTOTM.reliability.percent
        },
        tocs: nat.operators
          .filter(o => o.operatorType === 'FRANCHISED')
          .map(o => {
            const map = TOC_MAP[o.desc] || { abbr: o.desc, sector: 'Long Distance', gbr: true };
            return {
              name:   o.desc,
              abbr:   map.abbr,
              sector: map.gbr ? map.sector : 'Non-GBR',
              punct:  o.RTOTM.punctuality.timeTo3.percent,
              canc:   o.RTOTM.reliability.percent
            };
          })
      };
    }

    function setLiveState(ok) {
      const pill = document.querySelector('.live-pill');
      const dot  = pill.querySelector('.live-dot');
      const txt  = pill.querySelector('.live-text');
      if (ok) {
        pill.classList.remove('error-pill');
        dot.style.background = '';
        dot.style.animationPlayState = '';
        txt.style.color = '';
        txt.textContent = 'Live';
      } else {
        pill.classList.add('error-pill');
        dot.style.background = 'var(--red)';
        dot.style.animationPlayState = 'paused';
        txt.style.color = 'var(--red)';
        txt.textContent = 'Data unavailable';
      }
    }

    const ragP = v => v >= 85 ? 'green' : v >= 80 ? 'amber' : 'red';
    const ragC = v => v <= 2  ? 'green' : v <=  4 ? 'amber' : 'red';

    let sortBy   = 'punct';
    let sortDir  = 'worst';
    let lastData = null;

    function applySort(tocs) {
      return [...tocs].sort((a, b) => {
        const va = a[sortBy], vb = b[sortBy];
        const ascending = sortBy === 'punct' ? sortDir === 'worst' : sortDir === 'best';
        return ascending ? va - vb : vb - va;
      });
    }

    function setSortBy(by) {
      sortBy = by;
      document.getElementById('btnPunct').classList.toggle('active', by === 'punct');
      document.getElementById('btnCanc').classList.toggle('active', by === 'canc');
      if (lastData) render(lastData);
    }

    function setSortDir(dir) {
      sortDir = dir;
      document.getElementById('btnWorst').classList.toggle('active', dir === 'worst');
      document.getElementById('btnBest').classList.toggle('active', dir === 'best');
      if (lastData) render(lastData);
    }

    // ── Live clock (independent of data fetch) ───────────────────────────
    function updateClock() {
      const now = new Date();
      document.getElementById('timestamp').textContent =
        now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      document.getElementById('datestamp').textContent =
        now.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' });
    }
    updateClock();
    setInterval(updateClock, 1000);

    // ── Breathing flash on value change ──────────────────────────────────
    function flashEl(el) {
      el.classList.remove('value-update');
      void el.offsetWidth; // force reflow to restart animation
      el.classList.add('value-update');
    }

    function render(d) {
      const prev = lastData; // capture before overwriting
      lastData = d;

      // National metrics — flash if value changed
      const pp   = ragP(d.national.punct);
      const pc   = ragC(d.national.canc);
      const pEl  = document.getElementById('natPunctVal');
      const cEl  = document.getElementById('natCancVal');
      const natPunctChanged = prev && prev.national.punct !== d.national.punct;
      const natCancChanged  = prev && prev.national.canc  !== d.national.canc;

      pEl.className   = `nat-metric-value nat-${pp}`;
      pEl.textContent = d.national.punct.toFixed(1) + '%';
      cEl.className   = `nat-metric-value nat-${pc}`;
      cEl.textContent = d.national.canc.toFixed(1) + '%';

      if (natPunctChanged) flashEl(pEl);
      if (natCancChanged)  flashEl(cEl);

      document.getElementById('lastUpdated').textContent =
        'Updated ' + new Date().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', second: '2-digit' });

      // Build lookup of previous TOC values for change detection
      const prevMap = {};
      if (prev) prev.tocs.forEach(t => { prevMap[t.abbr] = { punct: t.punct, canc: t.canc }; });

      const isMobile = window.innerWidth <= 700;
      const cols     = isMobile ? 2 : 3;
      const grid     = document.getElementById('tocGrid');

      // Group TOCs by sector, sort within each sector
      const sectorMap = {};
      SECTOR_ORDER.forEach(s => { sectorMap[s] = []; });
      d.tocs.forEach(t => {
        const s = SECTOR_ORDER.includes(t.sector) ? t.sector : 'Long Distance';
        sectorMap[s].push(t);
      });
      const sectors = SECTOR_ORDER
        .map(s => ({ name: s, tocs: applySort(sectorMap[s]) }))
        .filter(s => s.tocs.length > 0);

      // Row counts per sector (data rows only)
      const dataRowCounts = sectors.map(s => Math.ceil(s.tocs.length / cols));
      const totalDataRows = dataRowCounts.reduce((a, b) => a + b, 0);
      const numDividers   = sectors.length;

      let mSize, nameSize;

      if (isMobile) {
        grid.style.gridTemplateColumns = 'repeat(2, 1fr)';
        grid.style.gridTemplateRows    = '';
        mSize    = Math.round(window.innerWidth * 0.056);
        nameSize = null; // CSS-controlled on mobile
      } else {
        grid.style.gridTemplateColumns = '';

        // Build explicit row template: 28px for each sector header, 1fr for each data row
        const rowDefs = [];
        sectors.forEach((s, i) => {
          rowDefs.push('32px');
          for (let r = 0; r < dataRowCounts[i]; r++) rowDefs.push('1fr');
        });
        grid.style.gridTemplateRows = rowDefs.join(' ');

        // Calculate metric font size from available row height
        const wrapH       = grid.parentElement.clientHeight;
        const gapPx       = Math.min(Math.max(4, window.innerHeight * 0.005), 9);
        const headerRowH  = 32;
        const totalItems  = totalDataRows + numDividers;
        const totalGapH   = gapPx * (totalItems - 1);
        const availH      = wrapH - headerRowH * numDividers - totalGapH;
        const rowH        = totalDataRows > 0 ? availH / totalDataRows : 40;
        mSize    = Math.round(Math.min(Math.max(16, rowH * 0.50), 66));
        nameSize = Math.round(Math.min(Math.max(13, rowH * 0.36), 38));
      }

      // Build HTML
      let html = '';
      sectors.forEach(({ name: sectorName, tocs }) => {
        html += `<div class="sector-header">${sectorName}</div>`;

        tocs.forEach(t => {
          const rp        = ragP(t.punct);
          const rc        = ragC(t.canc);
          const borderRag = sortBy === 'punct' ? rp : rc;

          // Active sort metric leads — swap order and alignment when sorting by canc
          const punctClass   = sortBy === 'canc' ? 'toc-metric right' : 'toc-metric';
          const cancClass    = sortBy === 'canc' ? 'toc-metric'       : 'toc-metric right';
          const punctChanged = prevMap[t.abbr] && prevMap[t.abbr].punct !== t.punct;
          const cancChanged  = prevMap[t.abbr] && prevMap[t.abbr].canc  !== t.canc;

          const punctBlock = `<div class="${punctClass}">
                    <span class="toc-metric-value ${rp}" style="font-size:${mSize}px"${punctChanged ? ' data-upd' : ''}>${t.punct.toFixed(1)}%</span>
                    <span class="toc-metric-label">Time to 3</span>
                  </div>`;
          const cancBlock  = `<div class="${cancClass}">
                    <span class="canc-value ${rc}" style="font-size:${mSize}px"${cancChanged ? ' data-upd' : ''}>${t.canc.toFixed(1)}%</span>
                    <span class="toc-metric-label">${isMobile ? 'Canc' : 'Cancellations'}</span>
                  </div>`;

          const metricsHtml = sortBy === 'canc'
            ? cancBlock + punctBlock
            : punctBlock + cancBlock;

          if (isMobile) {
            html += `
              <div class="toc-card card-${borderRag}">
                <div class="toc-name">${t.abbr}</div>
                <div class="toc-body">${metricsHtml}</div>
              </div>`;
          } else {
            // Metrics are direct grid children — no toc-body wrapper
            html += `
              <div class="toc-card card-${borderRag} card-row">
                <div class="toc-name" style="font-size:${nameSize}px">${t.abbr}</div>
                ${metricsHtml}
              </div>`;
          }
        });
      });

      grid.innerHTML = html;

      // Trigger breathing animation on any values that changed
      grid.querySelectorAll('[data-upd]').forEach(flashEl);
    }

    function tick() {
      loadData()
        .then(data => { setLiveState(true); render(data); })
        .catch(err  => { console.error('Data fetch failed:', err); setLiveState(false); });
    }

    tick();
    setInterval(tick, 15_000);
  </script>

</body>
</html>
